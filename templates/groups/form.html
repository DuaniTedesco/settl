{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-sm">
  <div style="margin-bottom:1.25rem;"><a href="/groups/" style="font-size:14px;color:var(--text-secondary);">← Meus grupos</a></div>
  <h1 class="page-title" style="margin-bottom:1.5rem;">{{ title }}</h1>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="form-error">{{ field.errors|join:", " }}</p>{% endif %}
      </div>
      {% endfor %}
      <div style="display:flex;gap:8px;margin-top:1rem;">
        <button type="submit" class="btn btn-primary">Criar grupo</button>
        <a href="/groups/" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
