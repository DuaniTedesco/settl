{% extends "base.html" %}
{% block title %}Registrar acerto — {{ group.name }}{% endblock %}
{% block content %}
<div class="container-sm">
  <div style="margin-bottom:1rem;"><a href="/groups/{{ group.pk }}/" style="font-size:14px;color:var(--text-secondary);">← {{ group.name }}</a></div>
  <h1 class="page-title" style="margin-bottom:.5rem;">Registrar acerto</h1>
  <p style="color:var(--text-secondary);font-size:14px;margin-bottom:1.5rem;">O destinatário precisará confirmar o recebimento para atualizar os saldos.</p>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Pagar para</label>
        <select name="receiver">
          {% for user_obj in form.fields.receiver.queryset %}
          <option value="{{ user_obj.pk }}">{{ user_obj.get_full_name }}{% if user_obj.pix_key %} — Pix: {{ user_obj.pix_key }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" name="amount" step="0.01" min="0.01" placeholder="0,00" required>
      </div>
      <div class="form-group">
        <label>Chave Pix usada <span style="font-weight:400;color:var(--text-hint)">(opcional)</span></label>
        <input type="text" name="pix_key_used" placeholder="Para referência do pagamento">
      </div>
      <div class="form-group">
        <label>Observações <span style="font-weight:400;color:var(--text-hint)">(opcional)</span></label>
        <textarea name="notes" rows="2" placeholder="Ex: Pago via Pix em 15/05"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:.5rem;">
        <button type="submit" class="btn btn-primary">Registrar acerto</button>
        <a href="/groups/{{ group.pk }}/" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
